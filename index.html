<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plain Text → PDF · autocorrect + organize</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f7fb;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
    }
    .card {
      max-width: 1100px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
      padding: 2rem 2rem 2.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #0b1e33;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.2rem;
    }
    .sub {
      color: #4a5b6e;
      font-weight: 400;
      font-size: 0.95rem;
      margin-bottom: 1.8rem;
      border-left: 4px solid #7b8cff;
      padding-left: 1rem;
      background: #f0f3fe;
      border-radius: 0 12px 12px 0;
      line-height: 1.4;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.8rem;
      margin-top: 0.4rem;
    }
    @media (max-width: 720px) {
      .grid-2 { grid-template-columns: 1fr; gap: 2rem; }
      body { padding: 1rem; }
      .card { padding: 1.5rem; }
    }
    .panel {
      background: #fafcff;
      border-radius: 20px;
      padding: 1.2rem 1.2rem 1.5rem;
      border: 1px solid #eef2f8;
    }
    .panel h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #1a2b3c;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    textarea {
      width: 100%;
      height: 340px;
      padding: 1rem 1.1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #1a2632;
      background: white;
      border: 1px solid #d8e0ea;
      border-radius: 18px;
      resize: vertical;
      transition: 0.15s;
    }
    textarea:focus {
      outline: none;
      border-color: #7b8cff;
      box-shadow: 0 0 0 4px rgba(123, 140, 255, 0.15);
    }
    .preview-box {
      background: white;
      border: 1px solid #d8e0ea;
      border-radius: 18px;
      padding: 1rem 1.2rem;
      min-height: 340px;
      max-height: 400px;
      overflow-y: auto;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1a2632;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .preview-box p { margin: 0 0 0.5rem 0; }
    .preview-box p:last-child { margin-bottom: 0; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin: 1.6rem 0 0.6rem;
      gap: 12px;
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn {
      background: white;
      border: 1px solid #ced6e3;
      padding: 0.6rem 1.3rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      color: #1b2c3f;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: #1f2e47;
      border: 1px solid #1f2e47;
      color: white;
      box-shadow: 0 4px 10px rgba(26,45,75,0.2);
    }
    .btn-primary:hover {
      background: #142133;
      transform: scale(0.97);
    }
    .btn-outline:hover {
      background: #eef3fc;
      border-color: #9aabbf;
    }
    .btn-success {
      background: #1f7b4d;
      border: 1px solid #1f7b4d;
      color: white;
      box-shadow: 0 4px 10px rgba(28,110,64,0.25);
    }
    .btn-success:hover {
      background: #14633d;
      transform: scale(0.97);
    }
    .footer-hint {
      font-size: 0.8rem;
      color: #5b6f86;
      margin-top: 1rem;
      border-top: 1px solid #e3eaf2;
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .footer-hint span {
      background: #eff3f9;
      padding: 0.1rem 0.9rem;
      border-radius: 50px;
    }
    .diff-highlight {
      background: #e8f0fe;
      padding: 0 4px;
      border-radius: 4px;
    }
    #statusMsg {
      font-size: 0.85rem;
      color: #1f7b4d;
      padding: 0.3rem 1rem;
      background: #e6f5ed;
      border-radius: 30px;
      display: inline-block;
    }
    #statusMsg.error {
      background: #fde8e8;
      color: #b33c3c;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>📄 Text → PDF</h1>
  <div class="sub">⚡ Paste text · autocorrect (caps, spaces, punctuation) · download as PDF</div>

  <div class="grid-2">
    <div class="panel">
      <h2>📝 Input</h2>
      <textarea id="inputText" placeholder="Paste your plain text here...">Hello there! this is a sample text..   It has some extra spaces and missing capitalization. 
We'll fix that automatically. 
Also:   multiple spaces,  weird punctuation like ' quotation marks , and run-on sentences? 

This is a new paragraph (two line breaks above). 
Let's add some structure: 
- item one 
- item two 
- item three with  extra   spaces 

Email: test@example.com,  and a date: 2026-06-25.</textarea>
      <div style="margin-top: 0.7rem; display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn btn-outline" id="clearBtn" style="padding: 0.3rem 1rem;">🗑️ Clear</button>
        <button class="btn btn-outline" id="sampleBtn" style="padding: 0.3rem 1rem;">📋 Load sample</button>
      </div>
    </div>

    <div class="panel">
      <h2>👁️ Preview <span style="font-weight:400;font-size:0.8rem;color:#5b6f86;">(formatted)</span></h2>
      <div id="previewContainer" class="preview-box">
        <span style="color: #7a8b9f;">Paste text and click "Autocorrect &amp; organize"</span>
      </div>
      <div class="toolbar">
        <div class="btn-group">
          <button class="btn btn-primary" id="formatBtn">✨ Autocorrect &amp; organize</button>
        </div>
        <button class="btn btn-success" id="pdfBtn">⬇️ Download PDF</button>
      </div>
      <div id="statusMsg"></div>
    </div>
  </div>

  <div class="footer-hint">
    <span>📌 Fixes: capitalization • spacing • punctuation • quotes</span>
    <span>🧩 Double line break → new paragraph</span>
  </div>
</div>

<script>
(function() {
  const inputText = document.getElementById('inputText');
  const previewContainer = document.getElementById('previewContainer');
  const formatBtn = document.getElementById('formatBtn');
  const pdfBtn = document.getElementById('pdfBtn');
  const clearBtn = document.getElementById('clearBtn');
  const sampleBtn = document.getElementById('sampleBtn');
  const statusMsg = document.getElementById('statusMsg');

  function showStatus(msg, isError = false) {
    statusMsg.textContent = msg;
    statusMsg.className = isError ? 'error' : '';
    if (msg) statusMsg.style.display = 'inline-block';
    else statusMsg.style.display = 'none';
    if (!isError) {
      setTimeout(() => { statusMsg.style.display = 'none'; }, 4000);
    }
  }

  // ---------- STRONG autocorrect ----------
  function autocorrectAndOrganize(text) {
    if (!text) return '';

    let t = text;

    // 1. Normalize line endings
    t = t.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

    // 2. Fix multiple spaces (reduce to single space, but keep intentional indentation)
    t = t.replace(/[ ]{2,}/g, ' ');

    // 3. Fix quotes: replace curly with straight
    t = t.replace(/['']/g, "'").replace(/[""]/g, '"');

    // 4. Fix spacing around punctuation: remove space before .,!?;:
    t = t.replace(/[ ]([.,!?;:])/g, '$1');
    // Add space after punctuation if missing (but not at end of string)
    t = t.replace(/([.,!?;:])([^\s])/g, '$1 $2');

    // 5. Capitalize first letter of each sentence
    // Split by sentence endings: . ! ? followed by space or end
    let parts = t.match(/[^.!?]+[.!?]+/g);
    if (parts) {
      let rest = t.slice(parts.join('').length);
      parts = parts.map(s => {
        let trimmed = s.trim();
        if (trimmed.length > 1) {
          return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
        }
        return trimmed;
      });
      t = parts.join(' ') + (rest ? ' ' + rest : '');
    } else {
      // No sentence punctuation found - capitalize first letter of each line
      t = t.split('\n').map(line => {
        if (line.trim().length > 0) {
          return line.trim().charAt(0).toUpperCase() + line.trim().slice(1);
        }
        return line;
      }).join('\n');
    }

    // 6. Capitalize standalone "i"
    t = t.replace(/\bi\b/g, 'I');

    // 7. Fix "i'm", "i'll", etc.
    t = t.replace(/\bi'm\b/g, "I'm");
    t = t.replace(/\bi'll\b/g, "I'll");
    t = t.replace(/\bi've\b/g, "I've");
    t = t.replace(/\bi'd\b/g, "I'd");

    // 8. Fix common abbreviations (e.g., "dont" -> "don't")
    const fixes = {
      'dont': "don't",
      'wont': "won't",
      'cant': "can't",
      'shouldnt': "shouldn't",
      'wouldnt': "wouldn't",
      'couldnt': "couldn't",
      'isnt': "isn't",
      'arent': "aren't",
      'wasnt': "wasn't",
      'werent': "weren't",
      'hasnt': "hasn't",
      'havent': "haven't",
      'hadnt': "hadn't",
      'didnt': "didn't",
      'doesnt': "doesn't",
      'im': "I'm",
      'ive': "I've",
      'ill': "I'll",
      'id': "I'd"
    };
    for (let [key, val] of Object.entries(fixes)) {
      let regex = new RegExp('\\b' + key + '\\b', 'gi');
      t = t.replace(regex, val);
    }

    // 9. Fix double spaces again
    t = t.replace(/[ ]{2,}/g, ' ');

    // 10. Trim trailing spaces per line
    t = t.split('\n').map(line => line.trimEnd()).join('\n');

    return t;
  }

  // ---------- render preview ----------
  function renderPreview(text) {
    if (!text || text.trim() === '') {
      previewContainer.innerHTML = `<span style="color: #7a8b9f;">(empty) paste text and click "Autocorrect"</span>`;
      return;
    }

    const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
    let html = '';

    for (let p of paragraphs) {
      let lines = p.split('\n').filter(line => line.trim().length > 0);
      if (lines.length === 0) continue;
      if (lines.length === 1) {
        html += `<p>${escapeHtml(lines[0])}</p>`;
      } else {
        html += `<p>${lines.map(line => escapeHtml(line)).join('<br>')}</p>`;
      }
    }

    if (html === '') {
      previewContainer.innerHTML = `<span style="color: #7a8b9f;">(formatted preview)</span>`;
      return;
    }

    previewContainer.innerHTML = `<div class="pdf-ready">${html}</div>`;
  }

  function escapeHtml(str) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return str.replace(/[&<>"']/g, m => map[m]);
  }

  // ---------- apply format ----------
  function applyFormat() {
    const raw = inputText.value;
    if (!raw.trim()) {
      showStatus('⚠️ Please paste some text first', true);
      return;
    }
    const corrected = autocorrectAndOrganize(raw);
    // Show diff: how many changes?
    const changes = raw.length - corrected.length;
    inputText.value = corrected;
    renderPreview(corrected);
    showStatus(`✅ Autocorrected • ${Math.abs(changes)} character changes`, false);
  }

  // ---------- generate PDF (FIXED) ----------
  function generatePDF() {
    const previewHtml = previewContainer.innerHTML;
    if (!previewHtml || previewHtml.includes('(empty)') || previewHtml.includes('Paste text')) {
      showStatus('⚠️ Please format your text first (click "Autocorrect")', true);
      return;
    }

    // Create a visible container for PDF generation
    const pdfContainer = document.createElement('div');
    pdfContainer.style.position = 'fixed';
    pdfContainer.style.top = '-9999px';
    pdfContainer.style.left = '-9999px';
    pdfContainer.style.width = '800px';
    pdfContainer.style.background = 'white';
    pdfContainer.style.padding = '2rem';
    pdfContainer.style.zIndex = '9999';
    document.body.appendChild(pdfContainer);

    // Clone the preview content
    const previewContent = previewContainer.cloneNode(true);
    previewContent.style.maxHeight = 'none';
    previewContent.style.overflow = 'visible';
    previewContent.style.border = 'none';
    previewContent.style.padding = '0';
    previewContent.style.background = 'transparent';
    pdfContainer.appendChild(previewContent);

    // Also add style for PDF
    const style = document.createElement('style');
    style.textContent = `
      body { font-family: 'Segoe UI', 'Roboto', sans-serif; background: white; }
      .pdf-ready p { margin: 0.8rem 0; line-height: 1.7; }
      .preview-box { padding: 0; }
    `;
    pdfContainer.appendChild(style);

    // Generate PDF
    const opt = {
      margin: [0.7, 0.7, 0.7, 0.7],
      filename: 'formatted-text.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { 
        scale: 2, 
        letterRendering: true,
        useCORS: true,
        logging: false,
        width: 800
      },
      jsPDF: { 
        unit: 'in', 
        format: 'a4', 
        orientation: 'portrait' 
      },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };

    showStatus('⏳ Generating PDF...', false);

    html2pdf()
      .set(opt)
      .from(pdfContainer)
      .save()
      .then(() => {
        document.body.removeChild(pdfContainer);
        showStatus('✅ PDF downloaded successfully!', false);
      })
      .catch(err => {
        document.body.removeChild(pdfContainer);
        showStatus('❌ PDF error: ' + err.message, true);
        console.error('PDF error:', err);
      });
  }

  // ---------- event binding ----------
  formatBtn.addEventListener('click', applyFormat);

  pdfBtn.addEventListener('click', generatePDF);

  clearBtn.addEventListener('click', function() {
    inputText.value = '';
    previewContainer.innerHTML = `<span style="color: #7a8b9f;">(empty) paste text and click "Autocorrect"</span>`;
    showStatus('', false);
  });

  sampleBtn.addEventListener('click', function() {
    const sample = `Hello there! this is a sample text..   It has some extra spaces and missing capitalization. 
We'll fix that automatically. 
Also:   multiple spaces,  weird punctuation like ' quotation marks , and run-on sentences? 

This is a new paragraph (two line breaks above). 
Let's add some structure: 
- item one 
- item two 
- item three with  extra   spaces 

Email: test@example.com,  and a date: 2026-06-25. 
We'll keep your formatting clean.`;
    inputText.value = sample;
    applyFormat();
  });

  // Ctrl+Enter to format
  inputText.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      applyFormat();
    }
  });

  // Auto-format on load
  window.addEventListener('DOMContentLoaded', function() {
    sampleBtn.click();
  });

})();
</script>
</body>
</html>
